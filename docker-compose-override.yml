services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ""
    image: ""
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000